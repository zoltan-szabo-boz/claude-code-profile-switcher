; Claude Code Profile Switcher - Profile Configuration
;
; Each profile section defines:
;   detect = a string to search for in .claude/settings.json to identify this profile
;            The FIRST profile whose detect string is found becomes the "current" profile.
;            The LAST profile listed acts as the fallback (used when no detect string matches).
;
; Profile folder naming:
;   The active profile lives in:  %USERPROFILE%\.claude\
;   Parked profiles live in:      %USERPROFILE%\.claude<ProfileName>\
;   For example, a profile named "work" parks as .claudeWork

[work]
detect=CLAUDE_CODE_USE_BEDROCK

[personal]
detect=
